rules:
  openapi-version-present:
    description: OpenAPI version is required
    given: $.openapi
    severity: error
    then:
      function: truthy

  info-title-present:
    description: API title is required
    given: $.info.title
    severity: error
    then:
      function: truthy

  info-version-present:
    description: API version is required
    given: $.info.version
    severity: error
    then:
      function: truthy

  paths-present:
    description: API paths are required
    given: $.paths
    severity: error
    then:
      function: truthy

  operation-operationId:
    description: Each operation should have operationId
    given: $.paths[*][*]
    severity: warn
    then:
      field: operationId
      function: truthy

  operation-tags:
    description: Each operation should have tags
    given: $.paths[*][*]
    severity: warn
    then:
      field: tags
      function: truthy
