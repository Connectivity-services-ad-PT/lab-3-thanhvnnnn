name: Contract and Newman Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint OpenAPI contracts
        run: npx spectral lint contracts/*.yaml | tee reports/contract-lint-report.txt
        
      - name: Start Prism mock server
        run: nohup npx prism mock contracts/*.yaml --port 4010 > prism.log 2>&1 &
        
      - name: Wait for mock server
        run: npx wait-on http://localhost:4010/health --timeout 30000
        
      - name: Run Newman tests
        run: npm run test:mock
        
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/